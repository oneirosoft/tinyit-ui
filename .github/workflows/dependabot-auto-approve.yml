name: Dependabot Auto Approve

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-approve:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve minor and patch updates
        uses: actions/github-script@v7
        env:
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const updateType = process.env.UPDATE_TYPE;
            const allowedTypes = ['version-update:semver-minor', 'version-update:semver-patch'];

            if (!allowedTypes.includes(updateType)) {
              core.info(`Skipping auto-approval for update type: ${updateType}`);
              return;
            }

            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number,
            });

            const alreadyApproved = reviews.some(
              (review) => review.user?.login === 'github-actions[bot]' && review.state === 'APPROVED',
            );

            if (alreadyApproved) {
              core.info('Pull request already approved by github-actions[bot].');
              return;
            }

            await github.rest.pulls.createReview({
              owner,
              repo,
              pull_number,
              event: 'APPROVE',
              body: `Auto-approved Dependabot ${updateType} update.`,
            });
